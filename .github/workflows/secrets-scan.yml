name: Secrets Scan

on:
  workflow_call:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: action/checout@v5
        with:
          fetch-depth: 0

      - name: Run Gitlab Scanner
        uses: gitleaks/gitleaks@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} #github action manages this