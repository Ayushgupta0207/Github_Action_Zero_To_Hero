name: CICD

on:
  workflow_dispatch: 
    inputs:
      environments:
        description: Choose environment where you want to run the workflow
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        run: echo "Code has been pushed to build"
  build:
    runs-on: ubuntu-latest
    needs: code
    steps:
      - name: Build the container
        run: echo "Docker container is build"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test the container
        run: echo "Container tested successfully"
  deploy:
    if: inputs.environments == 'dev'
    runs-on: ubuntu-latest
    needs: [build,test]
    steps:
      - name: Deploy the Container
        run: echo "Code has been live on Production"
